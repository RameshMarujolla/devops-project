apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-dev
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://github.com/RameshMarujolla/devops-project.git
    targetRevision: dev
    path: applications/crossplane/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true